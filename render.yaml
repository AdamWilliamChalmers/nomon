# Render Blueprint for the Nomon web app (Next.js 14 in /web).
# Docs: https://render.com/docs/blueprint-spec
#
# Cron note: the weekly digest is NOT defined here. Rather than add a separate
# Render Cron Job service, we trigger the digest endpoints with a scheduled
# GitHub Action (see .github/workflows/cron-digest.yml) — free and plan-agnostic.
services:
  - type: web
    name: nomon-web
    runtime: node
    # Starter: no cold-start sleeping (unlike free), single instance by default —
    # which keeps the in-memory judge rate limiter (web/lib/rateLimit.ts) correct.
    plan: starter
    rootDir: web
    # --include=dev forces devDependencies (tailwindcss, postcss, typescript) to
    # install even when the platform sets NODE_ENV=production, which Next needs
    # at build time. next build/start run in production mode regardless.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      # Pin the Node version Render builds/runs with.
      - key: NODE_VERSION
        value: 20.18.0

      # --- Required: Supabase + email + cron auth ---
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false

      # --- Landing-page CTA (Chrome Web Store listing) ---
      - key: NEXT_PUBLIC_CHROME_STORE_URL
        sync: false

      # --- Optional: LLM judge cascade (leave blank to run rule-based only) ---
      # Cascade order: OpenAI (gpt-4o-mini) -> Gemini -> xAI (Grok) -> heuristic.
      - key: OPENAI_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Optional model overrides (repoint without a code change).
      - key: OPENAI_JUDGE_MODEL
        sync: false
      - key: XAI_MODEL
        sync: false
      - key: GEMINI_MODEL
        sync: false

      # --- Judge abuse guards (rate limit + denial-of-wallet budget cap) ---
      # Defaults live in web/lib/rateLimit.ts; set to override.
      - key: JUDGE_IP_PER_MIN
        sync: false
      - key: JUDGE_DAILY_BUDGET
        sync: false

      # --- Optional: Polar payments (Phase 2+) ---
      - key: POLAR_CHECKOUT_URL
        sync: false
      - key: NEXT_PUBLIC_POLAR_CHECKOUT_URL
        sync: false
      - key: POLAR_WEBHOOK_SECRET
        sync: false
